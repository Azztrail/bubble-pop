<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bubble Pop VST</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #050a14;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
            touch-action: none;
        }
        canvas { display: block; }
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        button {
            position: absolute;
            bottom: 40px;
            left: 40px;
            padding: 20px 40px;
            font-size: 24px;
            font-weight: bold;
            background: rgba(50, 150, 255, 0.4);
            color: white;
            border: 2px solid rgba(255, 255, 255, 0.8);
            border-radius: 15px;
            cursor: pointer;
            pointer-events: auto;
            backdrop-filter: blur(5px);
        }
        #win-message {
            position: absolute;
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #ffff00;
            font-size: 6vw;
            font-weight: bold;
            display: none;
            text-shadow: 0 0 30px rgba(255, 255, 0, 0.6);
            text-align: center;
        }
    </style>
</head>
<body>

    <canvas id="gameCanvas"></canvas>
    
    <div id="ui-layer">
        <button onclick="resetGame()">RESTART</button>
        <div id="win-message">CONGRATULATIONS!</div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const winMessage = document.getElementById('win-message');

        // 1. Setup Audio Objects
        const popSound = new Audio('pop.mp3');
        const winSound = new Audio('win.mp3');
        popSound.preload = 'auto';
        winSound.preload = 'auto';

        let width, height;
        let bubbles = [];
        let particles = [];
        let confetti = [];
        let bokeh = [];
        let poppedCount = 0;
        let gameWon = false;
        let bgHue = 220;

        // Game Configuration
        const MAX_POPS = 5;
        const BUBBLE_RADIUS = 75;

        function resize() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
            generateBokeh();
        }

        window.addEventListener('resize', resize);
        resize();

        function generateBokeh() {
            bokeh = [];
            for(let i=0; i<18; i++) {
                bokeh.push({
                    x: Math.random() * width,
                    y: Math.random() * height,
                    size: Math.random() * 350 + 100,
                    opacity: Math.random() * 0.04 + 0.01
                });
            }
        }

        class Bubble {
            constructor() {
                // Focus: Right-sided spawn for left-neglect training
                this.x = width * (Math.random() * 0.2 + 0.7); 
                this.y = Math.random() * (height - 250) + 125;
                // Movement: Slowly drift into the left field of view
                this.vx = -(Math.random() * 2 + 3.5);
                this.vy = (Math.random() - 0.5) * 3;
                this.radius = BUBBLE_RADIUS;
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;
                if (this.y - this.radius < 0 || this.y + this.radius > height) this.vy *= -1;
                if (this.x - this.radius < 0 || this.x + this.radius > width) this.vx *= -1;
            }

            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);

                // Glow
                let shadowGrad = ctx.createRadialGradient(0, 0, this.radius, 0, 0, this.radius + 15);
                shadowGrad.addColorStop(0, 'rgba(150, 200, 255, 0.15)');
                shadowGrad.addColorStop(1, 'rgba(150, 200, 255, 0)');
                ctx.fillStyle = shadowGrad;
                ctx.fillRect(-(this.radius+15), -(this.radius+15), (this.radius+15)*2, (this.radius+15)*2);

                // Main Bubble
                let grad = ctx.createRadialGradient(-this.radius/3, -this.radius/3, 5, 0, 0, this.radius);
                grad.addColorStop(0, 'rgba(200, 235, 255, 0.5)');
                grad.addColorStop(1, 'rgba(80, 140, 255, 0.2)');
                ctx.beginPath();
                ctx.arc(0, 0, this.radius, 0, Math.PI*2);
                ctx.fillStyle = grad;
                ctx.fill();

                // Shine (Specular Highlight)
                ctx.beginPath();
                ctx.ellipse(-this.radius*0.35, -this.radius*0.4, this.radius*0.25, this.radius*0.15, Math.PI/4, 0, Math.PI*2);
                ctx.fillStyle = 'rgba(255,255,255,0.5)';
                ctx.fill();

                // Reflection Curve
                ctx.beginPath();
                ctx.arc(0, 0, this.radius * 0.85, 0.8, 2.3);
                ctx.strokeStyle = 'rgba(255,255,255,0.2)';
                ctx.lineWidth = 3;
                ctx.stroke();

                ctx.restore();
            }
        }

        class Particle {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                let angle = Math.random() * Math.PI * 2;
                let speed = Math.random() * 12 + 4;
                this.vx = Math.cos(angle) * speed;
                this.vy = Math.sin(angle) * speed;
                this.alpha = 1.0;
                this.hue = Math.random() * 40 + 190; // Icy blue range
            }
            update() {
                this.vx *= 0.96;
                this.vy *= 0.96;
                this.vy += 0.1; // Slight gravity
                this.x += this.vx;
                this.y += this.vy;
                this.alpha -= 0.012; // Longer lasting shimmer
            }
            draw() {
                ctx.fillStyle = `hsla(${this.hue}, 100%, 85%, ${this.alpha})`;
                ctx.beginPath();
                ctx.arc(this.x, this.y, Math.random()*5 + 2, 0, Math.PI*2);
                ctx.fill();
            }
        }

        class Confetti {
            constructor() {
                this.x = Math.random() * width;
                this.y = -Math.random() * 500;
                this.vy = Math.random() * 4 + 3;
                this.vx = Math.random() * 3 - 1.5;
                this.size = Math.random() * 12 + 8;
                this.color = `hsl(${Math.random()*360}, 100%, 60%)`;
                this.rotation = Math.random() * 360;
                this.rSpeed = Math.random() * 10 - 5;
            }
            update() {
                this.y += this.vy;
                this.x += this.vx;
                this.rotation += this.rSpeed;
            }
            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation * Math.PI / 180);
                ctx.fillStyle = this.color;
                ctx.fillRect(-this.size/2, -this.size/2, this.size, this.size);
                ctx.restore();
            }
        }

        function resetGame() {
            bubbles = [];
            particles = [];
            confetti = [];
            poppedCount = 0;
            gameWon = false;
            bgHue = 220;
            winMessage.style.display = 'none';
            spawnBubble();
        }

        function spawnBubble() {
            if(!gameWon) bubbles.push(new Bubble());
        }

        function popBubble(b, index) {
            // Audio Logic
            popSound.currentTime = 0;
            popSound.play().catch(() => {});

            // Particle burst
            for(let i=0; i<50; i++) particles.push(new Particle(b.x, b.y));

            bubbles.splice(index, 1);
            poppedCount++;

            if (poppedCount >= MAX_POPS) {
                triggerWin();
            } else {
                setTimeout(spawnBubble, 500);
            }
        }

        function triggerWin() {
            gameWon = true;
            winSound.play().catch(() => {});
            winMessage.style.display = 'block';
            for(let i=0; i<120; i++) confetti.push(new Confetti());
        }

        // Interaction Handling
        canvas.addEventListener('pointerdown', (e) => {
            if (gameWon) return;
            const rect = canvas.getBoundingClientRect();
            const tx = e.clientX - rect.left;
            const ty = e.clientY - rect.top;

            bubbles.forEach((b, index) => {
                let dist = Math.hypot(tx - b.x, ty - b.y);
                // Increased hit area for easier iPad interaction
                if (dist < b.radius + 30) {
                    popBubble(b, index);
                }
            });
        });

        function loop() {
            // Background Animation
            if (gameWon) bgHue = (bgHue + 0.5) % 360;
            ctx.fillStyle = `hsl(${bgHue}, 50%, 8%)`;
            ctx.fillRect(0, 0, width, height);

            // Bokeh Background
            bokeh.forEach(b => {
                ctx.fillStyle = `rgba(200, 230, 255, ${b.opacity})`;
                ctx.beginPath();
                ctx.arc(b.x, b.y, b.size, 0, Math.PI*2);
                ctx.fill();
            });

            // Update & Draw Bubbles
            bubbles.forEach(b => { b.update(); b.draw(); });

            // Update & Draw Particles
            particles = particles.filter(p => p.alpha > 0);
            particles.forEach(p => { p.update(); p.draw(); });

            // Update & Draw Confetti
            confetti.forEach(c => { c.update(); c.draw(); });
            if (gameWon && confetti.length < 50) { // Keep some rain going
                confetti.push(new Confetti());
            }

            requestAnimationFrame(loop);
        }

        resetGame();
        loop();
    </script>
</body>
</html>
